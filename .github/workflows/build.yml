name: Build/Release Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        timeout-minutes: 30

      - name: Run Vite build
        run: npm run build
        timeout-minutes: 15

      - name: Build Electron app (Win)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never
        timeout-minutes: 30

      - name: Build Electron app (Mac)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish never
        timeout-minutes: 30

      - name: List build output
        run: ls -R dist-electron || dir dist-electron
        if: always()

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: |
            dist-electron/Adonai-Setup.exe
            dist-electron/Adonai-Mac.dmg
            dist-electron/Adonai-Mac.zip
            dist-electron/latest.yml
            dist-electron/latest-mac.yml
            dist-electron/*.blockmap
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
