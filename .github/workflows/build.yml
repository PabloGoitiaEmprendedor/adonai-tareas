name: Build/Release Electron App

on:
  push:
    tags:
      - 'v*' # Se activa cuando creas un tag que empieza con v (ej: v1.0.1)
  workflow_dispatch: # Permite activarlo manualmente desde la pestaña Actions de GitHub

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build and Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: "https://efkhtifyttuhlxbrbrht.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVma2h0aWZ5dHR1aGx4YnJicmh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjY5NjIsImV4cCI6MjA5MTI0Mjk2Mn0.AXByAH9uDFFbD0RLDSD15INvj6k0qsFbaW6k0aWZ4JU"
