<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Adonai — Tu lista de tareas siempre a la vista</title>
    <meta name="description" content="Una ventanita pequeña vive en tu escritorio. La miras, marcas lo que hiciste y listo. Sin abrir apps. Descarga gratis para Windows.">
    
    <!-- Google Fonts: Inter + Fraunces -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700;1,9..144,900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      window.onerror = function(msg, url, line, col, error) {
        if (window.electronAPI && window.electronAPI.log) {
          window.electronAPI.log('GLOBAL ERROR: ' + msg + ' at ' + url + ':' + line + ':' + col);
        } else {
          console.error('GLOBAL ERROR:', msg, url, line, col, error);
        }
        return false;
      };
      window.onunhandledrejection = function(event) {
        if (window.electronAPI && window.electronAPI.log) {
          window.electronAPI.log('UNHANDLED REJECTION: ' + event.reason);
        } else {
          console.error('UNHANDLED REJECTION:', event.reason);
        }
      };
    </script>

    <meta property="og:type" content="website" />
    
  <meta property="og:title" content="Adonai — Tu lista de tareas siempre a la vista">
