    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es Adonai?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Adonai es una aplicación gratuita de gestión de tareas que muestra una pequeña ventana flotante siempre visible en tu escritorio. Te permite ver, añadir y completar tareas sin tener que abrir ninguna aplicación. Disponible para Windows, Mac, web y móvil."
          }
        },
        {
          "@type": "Question",
          "name": "¿Es Adonai gratis?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, Adonai es completamente gratuito. No requiere cuenta, no requiere tarjeta de crédito. Solo descarga e instala."
          }
        },
        {
          "@type": "Question",
          "name": "¿En qué plataformas está disponible Adonai?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Adonai está disponible para Windows (descarga directa), macOS (descarga directa), en web desde el navegador (sin instalación) y en dispositivos móviles Android e iOS."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué diferencia hay entre la app de escritorio y la versión web?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La app de escritorio ofrece la mini-ventana flotante siempre visible, notificaciones nativas del sistema operativo e integración con Windows y Mac. La versión web permite gestionar tareas desde cualquier navegador sin instalar nada, tanto en ordenador como en móvil, pero sin la mini-ventana y sin notificaciones nativas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo funciona la mini-ventana flotante de Adonai?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La mini-ventana de Adonai es una pequeña barra que aparece siempre visible encima de todas tus aplicaciones en el escritorio. Puedes ver tus tareas del día, marcarlas como completadas con un clic, y añadir nuevas tareas en segundos, sin tener que cambiar de ventana o buscar la aplicación."
          }
        },
        {
          "@type": "Question",
          "name": "¿Adonai tiene temporizador de tareas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Adonai incluye un temporizador por tarea para que puedas trabajar con tiempo fijo. Al terminar el tiempo, decides si continúas o pasas a la siguiente tarea. Compatible con la técnica Pomodoro."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo descargo Adonai?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Puedes descargar Adonai gratis desde webadonai.com. Para Windows, descarga el archivo .exe; para Mac, descarga el .dmg. También puedes usarlo directamente en el navegador sin descargar nada."
          }
        }
      ]
    }
    </script>

    <!-- ═══════════════════════════════════════
         PERFORMANCE: error handler
    ═══════════════════════════════════════ -->
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var div = document.createElement('div');
        div.style.padding = '20px';
        div.style.color = 'red';
        div.style.background = 'white';
        div.style.position = 'fixed';
        div.style.inset = '0';
        div.style.zIndex = '9999';
        div.innerHTML = '<h1>ERROR CRÍTICO (INICIO)</h1><p>' + msg + '</p><p>En: ' + url + ':' + line + '</p><pre>' + (error ? error.stack : "") + '</pre>';
        document.body.appendChild(div);
        return false;
      };
    </script>
